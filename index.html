<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <meta name="theme-color" content="#0A1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NutriCrew" />
    <link rel="apple-touch-icon" href="/pwa-192.svg" />

    <!-- Fonts: preconnect first, then load async so they never block first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700;900&display=swap"
      />
    </noscript>

    <!-- Instant-paint branded splash — visible before any JS downloads.
         React replaces #root's children on first commit, hiding this automatically. -->
    <style>
      html, body { margin: 0; padding: 0; background: #0A1628; }
      #nc-splash {
        position: fixed; inset: 0;
        background: #0A1628;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: 'Orbitron', system-ui, sans-serif;
      }
      #nc-splash-logo {
        font-size: 26px; font-weight: 900;
        letter-spacing: 4px; color: #C9A84C;
        margin-bottom: 32px;
      }
      #nc-splash-spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(201,168,76,0.2);
        border-top-color: #C9A84C;
        border-radius: 50%;
        animation: nc-spin 0.9s linear infinite;
      }
      @keyframes nc-spin { to { transform: rotate(360deg); } }
    </style>

    <title>NutriCrew</title>
  </head>
  <body>
    <div id="root">
      <!-- Shown immediately on cold start; React removes this on first mount -->
      <div id="nc-splash">
        <div id="nc-splash-logo">✈ NUTRICREW</div>
        <div id="nc-splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
